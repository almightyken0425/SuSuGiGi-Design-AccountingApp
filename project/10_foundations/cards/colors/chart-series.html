<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../_chrome.css"/>
<style>
  html,body{height:100%;margin:0;}
  body{padding:24px;background:var(--surface);overflow:hidden;font-family:var(--font-sans);color:var(--ink);}
  .num{font-variant-numeric:tabular-nums;}
  .mono{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-2);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
</style></head><body>
  <div class="col" style="gap:12px">
    <div class="t-label">Chart series · primary[800→400]</div>
    <div class="row" style="gap:0;height:80px;border-radius:8px;overflow:hidden">
      <div style="flex:1;background:#221250"></div>
      <div style="flex:1;background:#2d176b"></div>
      <div style="flex:1;background:#381d85"></div>
      <div style="flex:1;background:#4323a0"></div>
      <div style="flex:1;background:#6248b0"></div>
    </div>
    <div class="row" style="font-size:11px;color:var(--ink-2);font-family:var(--font-mono)">
      <div style="flex:1">800</div><div style="flex:1">700</div><div style="flex:1">600</div><div style="flex:1">500</div><div style="flex:1">400</div>
    </div>
    <div style="font-size:12px;color:var(--ink-2);line-height:1.5">Dark→light marches the donut's slice from largest (top spend) to smallest. Teal theme uses the same march on its own scale.</div>
  </div>
</body></html>
