<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../_chrome.css"/>
<style>
  html,body{height:100%;margin:0;}
  body{padding:24px;background:var(--surface);overflow:hidden;font-family:var(--font-sans);color:var(--ink);}
  .num{font-variant-numeric:tabular-nums;}
  .mono{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-2);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
</style></head><body>
  <div class="col" style="gap:14px">
    <div class="t-label">Semantic surfaces & status</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px">
      <div class="col" style="gap:6px">
        <div class="mono">surfaces</div>
        
  <div class="row" style="gap:6px;flex-wrap:nowrap;align-items:stretch">
    
      <div class="col" style="gap:6px;flex:1;min-width:0">
        <div style="height:64px;border-radius:8px;background:#F2F2F7;border:1px solid var(--hairline)"></div>
        <div class="mono" style="font-size:9.5px;line-height:1.3">
          <div style="color:var(--ink);font-weight:500">bg</div>
          <div>#F2F2F7</div>
          <div style="color:var(--ink-3)">app base</div>
        </div>
      </div>
      <div class="col" style="gap:6px;flex:1;min-width:0">
        <div style="height:64px;border-radius:8px;background:#FFFFFF;border:1px solid var(--hairline)"></div>
        <div class="mono" style="font-size:9.5px;line-height:1.3">
          <div style="color:var(--ink);font-weight:500">surface</div>
          <div>#FFFFFF</div>
          <div style="color:var(--ink-3)">cards</div>
        </div>
      </div>
      <div class="col" style="gap:6px;flex:1;min-width:0">
        <div style="height:64px;border-radius:8px;background:#F5F5F5;border:1px solid var(--hairline)"></div>
        <div class="mono" style="font-size:9.5px;line-height:1.3">
          <div style="color:var(--ink);font-weight:500">surface-2</div>
          <div>#F5F5F5</div>
          <div style="color:var(--ink-3)">pressed</div>
        </div>
      </div>
  </div>
      </div>
      <div class="col" style="gap:6px">
        <div class="mono">status</div>
        
  <div class="row" style="gap:6px;flex-wrap:nowrap;align-items:stretch">
    
      <div class="col" style="gap:6px;flex:1;min-width:0">
        <div style="height:64px;border-radius:8px;background:#4CAF50;border:1px solid var(--hairline)"></div>
        <div class="mono" style="font-size:9.5px;line-height:1.3">
          <div style="color:var(--ink);font-weight:500">success</div>
          <div>#4CAF50</div>
          
        </div>
      </div>
      <div class="col" style="gap:6px;flex:1;min-width:0">
        <div style="height:64px;border-radius:8px;background:#FFC107;border:1px solid var(--hairline)"></div>
        <div class="mono" style="font-size:9.5px;line-height:1.3">
          <div style="color:var(--ink);font-weight:500">warning</div>
          <div>#FFC107</div>
          
        </div>
      </div>
      <div class="col" style="gap:6px;flex:1;min-width:0">
        <div style="height:64px;border-radius:8px;background:#F44336;border:1px solid var(--hairline)"></div>
        <div class="mono" style="font-size:9.5px;line-height:1.3">
          <div style="color:var(--ink);font-weight:500">error</div>
          <div>#F44336</div>
          
        </div>
      </div>
      <div class="col" style="gap:6px;flex:1;min-width:0">
        <div style="height:64px;border-radius:8px;background:#2196F3;border:1px solid var(--hairline)"></div>
        <div class="mono" style="font-size:9.5px;line-height:1.3">
          <div style="color:var(--ink);font-weight:500">info</div>
          <div>#2196F3</div>
          
        </div>
      </div>
  </div>
      </div>
    </div>
    <div class="col" style="gap:6px">
      <div class="mono">contrast accent (used sparingly)</div>
      
  <div class="row" style="gap:6px;flex-wrap:nowrap;align-items:stretch">
    
      <div class="col" style="gap:6px;flex:1;min-width:0">
        <div style="height:64px;border-radius:8px;background:#F24F13;border:1px solid var(--hairline)"></div>
        <div class="mono" style="font-size:9.5px;line-height:1.3">
          <div style="color:var(--ink);font-weight:500">purple-contrast</div>
          <div>#F24F13</div>
          <div style="color:var(--ink-3)">theme1</div>
        </div>
      </div>
      <div class="col" style="gap:6px;flex:1;min-width:0">
        <div style="height:64px;border-radius:8px;background:#FF6F00;border:1px solid var(--hairline)"></div>
        <div class="mono" style="font-size:9.5px;line-height:1.3">
          <div style="color:var(--ink);font-weight:500">teal-contrast</div>
          <div>#FF6F00</div>
          <div style="color:var(--ink-3)">theme2</div>
        </div>
      </div>
  </div>
    </div>
  </div>
</body></html>
