<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../_chrome.css"/>
<style>
  html,body{height:100%;margin:0;}
  body{padding:24px;background:var(--bg);overflow:hidden;font-family:var(--font-sans);color:var(--ink);}
</style></head><body>
  <div style="display:flex;gap:36px;align-items:center;justify-content:center;height:100%">
    <img src="../../../assets/logo.svg" width="128" height="128" style="display:block;border-radius:22%;box-shadow:0 8px 24px rgba(67,35,160,0.18)"/>
    <div style="display:flex;flex-direction:column;gap:8px;max-width:340px">
      <div style="font-size:32px;font-weight:500;color:var(--ink);letter-spacing:-0.3px;line-height:1.1">SuSuGiGi</div>
      <div style="font-size:14px;color:var(--ink-2);line-height:1.55">A rounded-square mark in <b>primary purple</b>, inscribed with the app's central UI motif: a donut chart ring with a single <b>contrast orange</b> slice — the same mark a user sees on their Home screen.</div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <span style="display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-2);padding:3px 8px;background:var(--surface);border:1px solid var(--hairline);border-radius:4px"><span style="width:9px;height:9px;border-radius:2px;background:#4323a0"></span> #4323a0</span>
        <span style="display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-2);padding:3px 8px;background:var(--surface);border:1px solid var(--hairline);border-radius:4px"><span style="width:9px;height:9px;border-radius:2px;background:#F24F13"></span> #F24F13</span>
        <span style="display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-2);padding:3px 8px;background:var(--surface);border:1px solid var(--hairline);border-radius:4px"><span style="width:9px;height:9px;border-radius:2px;background:#FFFFFF;border:1px solid var(--hairline)"></span> #FFFFFF</span>
      </div>
    </div>
  </div>
</body></html>
