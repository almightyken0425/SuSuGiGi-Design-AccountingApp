<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../_chrome.css"/>
<style>
  html,body{height:100%;margin:0;}
  body{padding:24px;background:var(--surface);overflow:hidden;font-family:var(--font-sans);color:var(--ink);}
  .num{font-variant-numeric:tabular-nums;}
  .mono{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-2);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
</style></head><body>
  <div class="col" style="gap:14px">
    <div class="t-label">Currency formatting · fmt(n, code) — NT$ default · sign as "-" · grouped digits</div>
    <div style="display:grid;grid-template-columns:auto 1fr;gap:10px 24px;font-size:15px;align-items:baseline">
      <span class="mono">TWD</span><span class="num" style="font-weight:500">NT$128,450</span>
      <span class="mono">TWD neg</span><span class="num" style="font-weight:500">-NT$1,480</span>
      <span class="mono">USD</span><span class="num" style="font-weight:500">US$15</span>
      <span class="mono">JPY</span><span class="num" style="font-weight:500">¥3,200</span>
      <span class="mono">EUR</span><span class="num" style="font-weight:500">€42</span>
      <span class="mono">GBP</span><span class="num" style="font-weight:500">£28</span>
      <span class="mono">converted</span><span class="num" style="font-weight:400;color:var(--ink-2);font-size:13px">≈ NT$480</span>
    </div>
    <div style="font-size:11px;color:var(--ink-3)">toLocaleString('en-US') — commas in every locale incl. zh-TW. Symbol always prefixes.</div>
  </div>
</body></html>
