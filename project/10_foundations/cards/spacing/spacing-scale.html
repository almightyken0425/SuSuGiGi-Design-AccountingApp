<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../_chrome.css"/>
<style>
  html,body{height:100%;margin:0;}
  body{padding:24px;background:var(--surface);overflow:hidden;font-family:var(--font-sans);color:var(--ink);}
  .num{font-variant-numeric:tabular-nums;}
  .mono{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-2);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
</style></head><body>
  <div class="col" style="gap:8px">
    <div class="t-label">Spacing · 4-multiple baseline</div>
    
      <div class="row" style="gap:14px;align-items:center;font-size:11px;font-family:var(--font-mono);color:var(--ink-2)">
        <span style="width:24px">1</span>
        <span class="num" style="width:36px">4px</span>
        <div style="height:14px;background:var(--p-500);width:4px;border-radius:3px"></div>
      </div>
      <div class="row" style="gap:14px;align-items:center;font-size:11px;font-family:var(--font-mono);color:var(--ink-2)">
        <span style="width:24px">2</span>
        <span class="num" style="width:36px">8px</span>
        <div style="height:14px;background:var(--p-500);width:8px;border-radius:3px"></div>
      </div>
      <div class="row" style="gap:14px;align-items:center;font-size:11px;font-family:var(--font-mono);color:var(--ink-2)">
        <span style="width:24px">3</span>
        <span class="num" style="width:36px">12px</span>
        <div style="height:14px;background:var(--p-500);width:12px;border-radius:3px"></div>
      </div>
      <div class="row" style="gap:14px;align-items:center;font-size:11px;font-family:var(--font-mono);color:var(--ink-2)">
        <span style="width:24px">4</span>
        <span class="num" style="width:36px">16px</span>
        <div style="height:14px;background:var(--p-500);width:16px;border-radius:3px"></div>
      </div>
      <div class="row" style="gap:14px;align-items:center;font-size:11px;font-family:var(--font-mono);color:var(--ink-2)">
        <span style="width:24px">6</span>
        <span class="num" style="width:36px">24px</span>
        <div style="height:14px;background:var(--p-500);width:24px;border-radius:3px"></div>
      </div>
      <div class="row" style="gap:14px;align-items:center;font-size:11px;font-family:var(--font-mono);color:var(--ink-2)">
        <span style="width:24px">8</span>
        <span class="num" style="width:36px">32px</span>
        <div style="height:14px;background:var(--p-500);width:32px;border-radius:3px"></div>
      </div>
      <div class="row" style="gap:14px;align-items:center;font-size:11px;font-family:var(--font-mono);color:var(--ink-2)">
        <span style="width:24px">10</span>
        <span class="num" style="width:36px">40px</span>
        <div style="height:14px;background:var(--p-500);width:40px;border-radius:3px"></div>
      </div>
      <div class="row" style="gap:14px;align-items:center;font-size:11px;font-family:var(--font-mono);color:var(--ink-2)">
        <span style="width:24px">12</span>
        <span class="num" style="width:36px">48px</span>
        <div style="height:14px;background:var(--p-500);width:48px;border-radius:3px"></div>
      </div>
      <div class="row" style="gap:14px;align-items:center;font-size:11px;font-family:var(--font-mono);color:var(--ink-2)">
        <span style="width:24px">16</span>
        <span class="num" style="width:36px">64px</span>
        <div style="height:14px;background:var(--p-500);width:64px;border-radius:3px"></div>
      </div>
    <div style="font-size:11px;color:var(--ink-3);margin-top:4px">Note skipped keys (no 5, 7, 9, 11, 13, 14, 15) — when you reach for one, step up.</div>
  </div>
</body></html>
