<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../_chrome.css"/>
<style>
  html,body{height:100%;margin:0;}
  body{padding:24px;background:var(--surface);overflow:hidden;font-family:var(--font-sans);color:var(--ink);}
  .num{font-variant-numeric:tabular-nums;}
  .mono{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-2);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
</style></head><body data-bg="tint" style="background:var(--bg)">
  <div class="col" style="gap:12px">
    <div class="t-label">FocusCard pair · expense / income · active = bordered + bright</div>
    <div class="row" style="gap:12px">
      <button style="flex:1;display:flex;align-items:center;gap:8px;padding:12px;border-radius:12px;border:1.5px solid var(--p-500);background:var(--surface);box-shadow:0 1px 2px rgba(0,0,0,.08);font-family:inherit;cursor:pointer">
        <div style="width:28px;height:28px;border-radius:8px;background:var(--p-100);display:flex;align-items:center;justify-content:center;color:var(--p-500)"><svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><rect x="2.5" y="7" width="11" height="2" rx="1"/></svg></div>
        <span class="num" style="flex:1;text-align:right;font-size:16px;font-weight:500;color:var(--ink)">-NT$3,455</span>
      </button>
      <button style="flex:1;display:flex;align-items:center;gap:8px;padding:12px;border-radius:12px;border:1.5px solid transparent;background:var(--surface-2);box-shadow:0 1px 2px rgba(0,0,0,.04);font-family:inherit;cursor:pointer">
        <div style="width:28px;height:28px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--ink-2)"><svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><rect x="7" y="2.5" width="2" height="11" rx="1"/><rect x="2.5" y="7" width="11" height="2" rx="1"/></svg></div>
        <span class="num" style="flex:1;text-align:right;font-size:16px;font-weight:500;color:var(--ink-2)">NT$68,000</span>
      </button>
    </div>
    <div style="font-size:11px;color:var(--ink-2)">Toggles the donut chart's series. Active: 1.5px primary border, white bg, ink amount, primary-100 icon slot. Inactive: transparent border, grey bg, dimmed amount.</div>
  </div>
</body></html>
