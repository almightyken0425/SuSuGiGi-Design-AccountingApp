<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../_chrome.css"/>
<style>
  html,body{height:100%;margin:0;}
  body{padding:24px;background:var(--surface);overflow:hidden;font-family:var(--font-sans);color:var(--ink);}
  .num{font-variant-numeric:tabular-nums;}
  .mono{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-2);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
</style></head><body data-bg="tint" style="background:var(--bg)">
  <div class="col" style="gap:12px">
    <div class="t-label">Transaction row · TX_LIST_TOKENS — date / category icon · note · amount · converted</div>

      <div style="padding:10px 16px;border-bottom:0.5px solid var(--hairline);display:flex;align-items:center;justify-content:space-between">
        <div class="row" style="gap:8px"><div style="transform:rotate(90deg);color:var(--ink-2)"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3L11 8L6 13"/></svg></div><div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--p-500)"><svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="2" width="1.6" height="12" rx="0.8"/><rect x="10.4" y="2" width="1.6" height="12" rx="0.8"/><rect x="3" y="2" width="10" height="1.6" rx="0.8"/></svg></div><span style="font-size:14px;font-weight:500">飲食</span></div>
        <span class="num" style="font-size:13px;font-weight:500">-NT$1,425</span>
      </div>
      <div style="padding:12px 16px;display:flex;gap:12px;align-items:center">
        <div style="width:32px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--ink-2)" class="num">5/2</div>
        <div style="flex:1;min-width:0"><div style="font-size:15px;color:var(--ink)">路易莎咖啡</div><div style="font-size:12px;color:var(--ink-2)">國泰世華 信用卡</div></div>
        <div style="display:flex;align-items:center;gap:16px"><div style="width:22px;height:22px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--ink-3)"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 1.5L13.5 4L11 6.5M2.5 8V6a2 2 0 012-2H13M5 14.5L2.5 12L5 9.5M13.5 8v2a2 2 0 01-2 2H3"/></svg></div><span class="num" style="font-size:16px;font-weight:500;color:var(--p-900)">-NT$185</span></div>
      </div>
      <div style="padding:12px 16px;display:flex;gap:12px;align-items:center;border-top:0.5px solid var(--hairline)">
        <div style="width:32px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--ink-2)" class="num">5/1</div>
        <div style="flex:1;min-width:0"><div style="font-size:15px;color:var(--ink)">Netflix 訂閱</div><div style="font-size:12px;color:var(--ink-2)">USD 旅費</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end"><span class="num" style="font-size:16px;font-weight:500;color:var(--p-900)">-US$15</span><span class="num" style="font-size:12px;color:var(--ink-2)">≈ NT$480</span></div>
      </div>
    </div>
  </div>
</body></html>
