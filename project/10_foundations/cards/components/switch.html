<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../_chrome.css"/>
<style>
  html,body{height:100%;margin:0;}
  body{padding:24px;background:var(--surface);overflow:hidden;font-family:var(--font-sans);color:var(--ink);}
  .num{font-variant-numeric:tabular-nums;}
  .mono{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-2);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
</style></head><body data-bg="tint" style="background:var(--bg)">
  <div class="col" style="gap:12px">
    <div class="t-label">Switch · iOS-style · track on = primary[500]</div>
    <div class="row" style="gap:32px">
      <div class="col" style="gap:8px;align-items:center">
        <button style="width:52px;height:32px;border-radius:16px;border:none;background:var(--surface-2);position:relative;padding:0"><div style="position:absolute;top:2px;left:2px;width:28px;height:28px;border-radius:14px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div></button>
        <span class="mono">off</span>
      </div>
      <div class="col" style="gap:8px;align-items:center">
        <button style="width:52px;height:32px;border-radius:16px;border:none;background:#4323a0;position:relative;padding:0"><div style="position:absolute;top:2px;left:22px;width:28px;height:28px;border-radius:14px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div></button>
        <span class="mono">on · primary</span>
      </div>
    </div>
  </div>
</body></html>
